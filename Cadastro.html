<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=AbeeZee&display=swap" rel="stylesheet">

<style>
body { font-family: 'AbeeZee', sans-serif; }
.card { text-align: center; }
input, select {
    width: 60%;
    padding: 10px;
    font-size: 16px;
    margin: 10px 0;
}
button {
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<header>
    <h1 style="text-align:center;">Bem-vindo ao Cadastro</h1>
</header>

<!-- NAV REMOVIDO -->

<main class="container">

<div class="card">
<h2>Cadastro de Alunos</h2>

<form id="formCadastro">

<input type="text" id="nome" placeholder="Nome" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="matricula" placeholder="Matrícula" required>

<!-- SELECT CURSO -->
<select id="curso" required>
<option value="">Selecione o Curso</option>
<option>Informática</option>
<option>Redes</option>
</select>

<!-- SELECT TURMA -->
<select id="turma">
<option>1A</option>
<option>1B</option>
<option>2A</option>
<option>2B</option>
<option>3A</option>
<option>3B</option>
</select>

<br>

<!-- RADIO (REQUISITO) -->
<label><strong>Turno:</strong></label><br>
<input type="radio" name="turno" checked> Integral

<br><br>

<!-- CHECKBOX (REQUISITO) -->
<label><strong>Aceita os termos?</strong></label><br>
<input type="checkbox" required> Sim

<br><br>

<button type="submit">Cadastrar</button>
<button type="reset">Limpar</button>

</form>
</div>

</main>

<footer>
<p>&copy; 2026 CEEP</p>
</footer>

<script>
document.getElementById("formCadastro").addEventListener("submit", function(e){
e.preventDefault();

let aluno = {
nome: nome.value,
email: email.value,
matricula: matricula.value,
curso: curso.value,
turma: turma.value
};

let alunos = JSON.parse(localStorage.getItem("alunos")) || [];
alunos.push(aluno);
localStorage.setItem("alunos", JSON.stringify(alunos));

formCadastro.reset();
window.location.href = "index.html";
});
</script>

</body>
</html>
